{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mcp-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "mcp-server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only Application Gateway subnet can reach the MCP pod directly.
    - from:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.appgatewaySubnetCidr }}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # OTel Collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agent-mesh-system
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Outbound to Azure services (Key Vault, Storage, etc.) — broad TCP/443.
    # Tighten with FQDN-based egress via Azure Firewall if compliance demands.
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
