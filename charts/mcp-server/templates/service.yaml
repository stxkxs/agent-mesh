apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "mcp-server.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "mcp-server.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
