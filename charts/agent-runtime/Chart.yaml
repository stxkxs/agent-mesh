apiVersion: v2
name: agent-mesh-agent-runtime
description: |
  Agent runtime Deployment + KEDA ScaledObject + DLQ handler. The pod
  reads from a Service Bus queue, drives a Claude / Azure OpenAI agent
  loop via @agent-mesh/sdk, writes idempotency state to Cosmos, and
  scales 0→N based on queue depth via KEDA.
