{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agent-runtime.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "agent-runtime.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels: {{- include "agent-runtime.selectorLabels" . | nindent 6 }}
{{- end }}
