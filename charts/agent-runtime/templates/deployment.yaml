apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-runtime.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "agent-runtime.labels" . | nindent 4 }}
spec:
  # KEDA owns replicas — leave the template at 1; it gets overwritten.
  replicas: 1
  selector:
    matchLabels: {{- include "agent-runtime.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-runtime.selectorLabels" . | nindent 8 }}
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "agent-runtime.serviceAccount" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AGENT_MESH_WORKSPACE
              value: {{ .Values.workspace | quote }}
            - name: AGENT_MESH_PROJECT
              value: {{ .Values.project | quote }}
            - name: AGENT_MESH_AGENT_ID
              value: {{ .Values.agentId | quote }}
            - name: SERVICEBUS_NAMESPACE
              value: {{ .Values.servicebus.namespace | quote }}
            - name: SERVICEBUS_QUEUE
              value: {{ .Values.servicebus.queue | quote }}
            - name: COSMOS_ENDPOINT
              value: {{ .Values.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.cosmos.database | quote }}
            - name: COSMOS_CONTAINER
              value: {{ .Values.cosmos.container | quote }}
            - name: PROVIDER_DEFAULT
              value: {{ .Values.provider.default | quote }}
            - name: AZURE_OPENAI_ENDPOINT
              value: {{ .Values.provider.azureOpenAI.endpoint | quote }}
            - name: AZURE_OPENAI_DEPLOYMENT
              value: {{ .Values.provider.azureOpenAI.deployment | quote }}
            - name: ANTHROPIC_MODEL
              value: {{ .Values.provider.anthropic.model | quote }}
            - name: ANTHROPIC_KV_SECRET
              value: {{ .Values.provider.anthropic.keyVaultSecretName | quote }}
            - name: KEY_VAULT_URI
              value: {{ .Values.keyVault.uri | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ printf "http://%s" .Values.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: "agent-mesh"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "agent_mesh.workspace={{ .Values.workspace }},agent_mesh.project={{ .Values.project }},agent_mesh.agent={{ .Values.agentId }}"
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
